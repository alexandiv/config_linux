unbind-key -a -T root

set -g pane-border-lines "double"
#set -g mouse on
set -g default-terminal "tmux-256color"
set -s escape-time 0
set -g history-limit 2000
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#{window_name}"
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

set -g allow-rename off

#bind -n S-PPage copy-mode -u
#bind -n S-NPage copy-mode -n

bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind -n M-s choose-tree -s

bind -n M-w command-prompt -I "#{window_name}" "rename-window '%%'"

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Right next-window
bind -n M-Left previous-window

bind -n M-C-Left select-pane -L
bind -n M-C-Right select-pane -R
bind -n M-C-Up select-pane -U
bind -n M-C-Down select-pane -D

bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D 3

bind -n M-h split-window -v
bind -n M-v split-window -h

bind -n M-Enter new-window
bind -n M-c kill-pane
bind -n M-q kill-window
bind -n M-z detach
bind -n M-Q confirm-before -p "Kill entire session? (y/n)" kill-session

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

